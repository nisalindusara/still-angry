<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      body {
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      section {
        width: 90%;
        height: 90%;
        background-color: antiquewhite;
        border: 1px solid black;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 60px;
        position: relative;
      }
      h1 {
        font-family: Verdana, Geneva, Tahoma, sans-serif;
      }
      .btn {
        padding: 10px 20px;
        border-radius: 4px;
      }
      .btn-primary {
        color: white;
        background-color: black;
      }
      .btn-secondary {
        position: absolute;
      }
    </style>
  </head>
  <body>
    <section>
      <h1>Still angry ?</h1>
      <button id="yes-btn" class="btn btn-secondary">Yes</button>
      <button id="no-btn" class="btn btn-primary">No</button>
    </section>

    <script>
      function moveButton(button, container) {
        const sectionWidth = container.clientWidth;
        const sectionHeight = container.clientHeight;

        const btnWidth = button.offsetWidth;
        const btnHeight = button.offsetHeight;

        const maxLeft = sectionWidth - btnWidth;
        const maxTop = sectionHeight - btnHeight;

        const randomLeft = Math.floor(Math.random() * maxLeft);
        const randomTop = Math.floor(Math.random() * maxTop);

        button.style.left = `${randomLeft}px`;
        button.style.top = `${randomTop}px`;
      }

      const section = document.querySelector("section");
      const yesBtn = document.getElementById("yes-btn");
      const noBtn = document.getElementById("no-btn");

      yesBtn.addEventListener("mouseover", (event) => {
        moveButton(yesBtn, section);
      });
      yesBtn.addEventListener("click", (event) => {
        moveButton(yesBtn, section);
      });

      noBtn.addEventListener("click", (event) => {
        const teddy = document.createElement("img");
        teddy.src = "teddy.jpg";
        teddy.style.width = "100%";
        teddy.style.height = "100%";
        teddy.style.objectFit = "contain";
        teddy.style.mixBlendMode = "multiply";
        section.innerHTML = "";
        section.appendChild(teddy);
      });
    </script>
  </body>
</html>
